{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGComplex</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=Space+Mono&display=swap">
    <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}">
</head>
<body>

<nav>
    <div class="container">
        <a href="{% url 'home' %}" class="headline" style="color: var(--teal); font-size: 1.3rem;">IGComplex</a>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'projects_list' %}">Projects</a>
            <a href="{% url 'cv' %}">CV</a>
            {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post" style="margin:0;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-red">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-teal">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<main>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer>
    <div class="container">
        <span class="headline" style="color: var(--red); font-size: 0.85rem;">© 2026 IGComplex — Django + Supabase</span>
        <div class="footer-links">
            <a href="#">Github</a>
            <a href="#">LinkedIn</a>
        </div>
    </div>
</footer>

</body>
</html>
