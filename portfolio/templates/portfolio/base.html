{% load static %}
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>IGComplex - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "primary": "#2fa8a8", 
              "accent": "#a82f2f",
              "background": "#0f0f0f",
              "surface-container": "#1a1a1a",
              "on-background": "#e5e2e1",
              "outline": "#444444",
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">

    <nav class="bg-[#131313] flex justify-between items-center px-10 py-6 w-full border-b border-outline-variant/10">
        <div class="text-xl font-bold tracking-tighter text-primary font-headline uppercase">
            IGComplex
        </div>
        <div class="hidden md:flex items-center gap-10">
            <a class="text-primary border-b-2 border-primary-container pb-1 font-headline text-sm uppercase tracking-wider" href="{% url 'home' %}">Home</a>
            <a class="text-outline font-headline text-sm uppercase tracking-wider hover:text-primary transition-colors" href="{% url 'projects_list' %}">Projects</a>
            <a class="text-outline font-headline text-sm uppercase tracking-wider hover:text-primary transition-colors" href="{% url 'cv' %}">CV</a>
            
            {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-secondary-container text-on-primary px-8 py-2 font-headline text-sm font-bold uppercase tracking-wider hover:bg-primary transition-all">
                        Logout
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="bg-primary-container text-on-primary px-8 py-2 font-headline text-sm font-bold uppercase tracking-wider hover:bg-primary transition-all">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-6 py-12">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-[#131313] border-t border-outline-variant/10 py-12 px-10 w-full mt-20">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-sm font-headline font-bold text-primary uppercase tracking-widest">
                © 2026 IGComplex - Built with Django + Supabase
            </div>
            <div class="flex gap-10">
                <a class="text-outline hover:text-primary font-headline text-xs uppercase tracking-[0.2em] underline underline-offset-8" href="#">Github</a>
                <a class="text-outline hover:text-primary font-headline text-xs uppercase tracking-[0.2em] underline underline-offset-8" href="#">Linkedin</a>
            </div>
        </div>
    </footer>
</body>
</html>
