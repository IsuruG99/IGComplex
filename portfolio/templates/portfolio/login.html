{% extends 'portfolio/base.html' %}
{% block content %}

<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md bg-surface-container p-8 border-t-4 border-primary">
        <header class="mb-8">
            <h1 class="font-headline text-2xl font-black text-primary uppercase tracking-widest flex items-center gap-3">
                <span class="material-symbols-outlined">lock</span>
                System Auth
            </h1>
            <p class="font-label text-[10px] text-outline uppercase tracking-[0.2em] mt-2">
                User: igcomplex@arch_linux
            </p>
        </header>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="font-label text-[11px] uppercase tracking-widest text-on-surface-variant">Access_Key</label>
                <input type="text" name="username" required 
                       class="w-full bg-surface-container-lowest border border-outline-variant/30 p-3 font-mono text-primary focus:border-primary focus:ring-0 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="font-label text-[11px] uppercase tracking-widest text-on-surface-variant">Pass_Hash</label>
                <input type="password" name="password" required 
                       class="w-full bg-surface-container-lowest border border-outline-variant/30 p-3 font-mono text-primary focus:border-primary focus:ring-0 outline-none transition-all">
            </div>

            <button type="submit" 
                    class="w-full bg-primary-container text-on-primary py-4 font-headline font-bold uppercase tracking-widest hover:bg-primary transition-colors flex items-center justify-center gap-2 group">
                Authenticate
                <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">login</span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-outline-variant/10">
            <p class="font-mono text-[9px] text-outline text-center uppercase tracking-widest opacity-50">
                Warning: Unauthorized access attempts are logged.
            </p>
        </div>
    </div>
</div>

{% endblock %}
